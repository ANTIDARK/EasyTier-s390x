name: EasyTier Core

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  build-s390x:
    runs-on: ubuntu-latest
    env:
      NAME: easytier
      TARGET: s390x-unknown-linux-gnu
      OS: ubuntu-24.04
      ARTIFACT_NAME: linux-s390x
      OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
    steps:
      - uses: actions/checkout@v5

      - name: Set build time
        run: |
          echo "BUILD_TIME=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Prepare build environment
        uses: ./.github/actions/prepare-build
        with:
          target: ${{ env.TARGET }}
          gui: false
          pnpm: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ""
          shared-key: "core-registry"
          cache-targets: "false"

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build
        run: |
          if [[ "$TARGET" == *windows* ]]; then
            SUFFIX=.exe
          else
            SUFFIX=""
          fi

          if [[ "$TARGET" =~ (x86_64-unknown-linux-musl|aarch64-unknown-linux-musl|windows|darwin) ]]; then
            BUILD=build
          else
            BUILD=zigbuild
          fi

          if [[ "$TARGET" =~ ^(riscv64|loongarch64|aarch64|s390x).*$ || "$TARGET" =~ (freebsd|windows) ]]; then
            FEATURES="mimalloc"
          else
            FEATURES="jemalloc"
          fi

          cargo $BUILD --release --target $TARGET --package=easytier-web --features=embed
          mv ./target/$TARGET/release/easytier-web"$SUFFIX" ./target/$TARGET/release/easytier-web-embed"$SUFFIX"

          cargo $BUILD --release --target $TARGET --features=$FEATURES

      - name: Compress and rename artifacts
        run: |
          mkdir -p ./artifacts

          if [[ $OS =~ ^ubuntu.*$ && ! $TARGET =~ (loongarch|freebsd) ]]; then
            HOST_ARCH=$(uname -m)
            case $HOST_ARCH in
              x86_64)  UPX_ARCH="amd64" ;;
              aarch64) UPX_ARCH="arm64" ;;
              *)       UPX_ARCH="amd64" ;;
            esac

            UPX_VERSION=4.2.4
            UPX_PKG="upx-${UPX_VERSION}-${UPX_ARCH}_linux"
            curl -L "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/${UPX_PKG}.tar.xz" -s | tar xJvf -
            cp "${UPX_PKG}/upx" .
            UPX_BIN=./upx
          fi

          for BIN in ./target/$TARGET/release/easytier-{core,cli,web,web-embed}"$SUFFIX"; do
            if [[ -f "$BIN" ]]; then
              if [[ -n "$UPX_BIN" ]]; then
                $UPX_BIN --lzma --best "$BIN" || true
              fi

              BASENAME=$(basename "$BIN")
              if [[ "$BASENAME" == *.* ]]; then
                NAME="${BASENAME%.*}"
                EXT=".${BASENAME##*.}"
              else
                NAME="$BASENAME"
                EXT=""
              fi

              mv "$BIN" "./artifacts/${NAME}-${BUILD_TIME}${EXT}"
            fi
          done

      - name: Archive artifact
        uses: actions/upload-artifact@v5
        with:
          name: easytier-${{ env.ARTIFACT_NAME }}-${{ env.BUILD_TIME }}
          path: ./artifacts/*
